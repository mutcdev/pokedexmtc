<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link rel="stylesheet" href="./css/style.css">

    <!-- Main JS -->
    <script defer src="./js/script.js"></script>
    <link rel="icon" type="image/png" href="./faviconmtc.png">

    <title>Pokédex</title>
</head>
<body>
    <link rel="icon" href="./faviconmtc.png">
    <main>
        <img src="#" class="pokemon_image">
        <h1 class="pokemon_data">
            <span class="pokemon_number"></span>
            <span class="pokemon_name"></span>
        </h1>

        <form class="form">
            <input
            type="search"
            class="input_search"
            placeholder="Number or Name"
            >
        </form>

        <div class="buttons">
            <button class="button btn_prev">Prev &lt;</button>
            <button class="button btn_next">Next &gt;</button>
        </div>

        <button class="btn_favorite" title="Favorite this Pokémon" ><span class="star">☆</span></button>
        <button class="btn_viewFav" ><span class="fav_text">View Favorites</span></button>

        <div class="pokemons_datas">
            <p>
                Type: 
                <span class="pokemon_type"></span>
            </p>
            <p>
                Height: 
                <span class="pokemon_height"></span>m
            </p>
            <p>
                Weight: 
                <span class="pokemon_weight"></span>kg
            </p>
            <p>
                Ablities: 
                <span class="pokemon_ablities"></span>
            </p>
            <div class="stats">
                <div class="stat">
                    <span>HP</span>
                        <div class="bar"><div class="fill hp"></div></div>
                </div>
                <div class="stat">
                    <span>ATK</span>
                        <div class="bar"><div class="fill attack"></div></div>
                </div>
                 <div class="stat">
                    <span>DEF</span>
                        <div class="bar"><div class="fill defense"></div></div>
                </div>
                <div class="stat">
                    <span>SPA</span>
                        <div class="bar"><div class="fill spAttack"></div></div>
                </div>
                <div class="stat">
                    <span>SPD</span>
                        <div class="bar"><div class="fill spDefense"></div></div>
                </div>
                <div class="stat">
                    <span>SPE</span>
                        <div class="bar"><div class="fill speed"></div></div>
                </div>
            </div>
        </div>

        <img src="pokedex.png" class="pokedex">
    </main>
    
</body>
</html>
